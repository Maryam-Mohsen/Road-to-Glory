<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Events - Road to Glory</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand">ROAD TO <span>GLORY</span></div>
  <div class="nav-links">
    <a href="events.html" class="active">Events</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="#" onclick="logout()">Sign Out</a>
  </div>
</div>

<div class="container">
  <div id="create-event-card" class="card hidden">
    <h2>Create Event</h2>
    <div id="create-msg"></div>
    <form id="create-form">
      <label>Title</label>
      <input type="text" id="ev-title" required>
      <label>Category</label>
      <select id="ev-category">
        <option>Fan Zone</option>
        <option>Public Match Screening</option>
        <option>Volunteer Program</option>
        <option>Press Conference</option>
        <option>Community Activity</option>
        <option>Celebration Event</option>
      </select>
      <label>Description</label>
      <textarea id="ev-description" rows="3" required></textarea>
      <label>Location</label>
      <input type="text" id="ev-location" required>
      <label>Date &amp; Time</label>
      <input type="datetime-local" id="ev-date" required>
      <label>Capacity</label>
      <input type="number" id="ev-capacity" min="1" required>
      <button type="submit" style="margin-top:18px;">Publish Event</button>
    </form>
  </div>

  <h2>Upcoming Events</h2>
  <div id="msg"></div>
  <div class="grid" id="events-grid"></div>
</div>

<script src="js/api.js"></script>
<script src="js/events.js"></script>
</body>
</html>
