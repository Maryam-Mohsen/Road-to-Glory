<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Road to Glory</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand">ROAD TO <span>GLORY</span></div>
  <div class="nav-links">
    <a href="events.html">Events</a>
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="#" onclick="logout()">Sign Out</a>
  </div>
</div>

<div class="container">
  <h1 id="welcome"></h1>
  <div id="msg"></div>

  <!-- ATTENDEE -->
  <section id="attendee-section" class="hidden">
    <h2>My Digital Tickets</h2>
    <div id="tickets-list"></div>
  </section>

  <!-- ORGANIZER -->
  <section id="organizer-section" class="hidden">
    <h2>My Events</h2>
    <div id="organizer-events"></div>

    <h2>Validate a Ticket</h2>
    <div class="card" style="max-width:420px;">
      <label>Ticket Code</label>
      <input type="text" id="ticket-code" placeholder="RTG-XXXXXXXXXX">
      <button style="margin-top:14px;" onclick="validateTicket()">Check In Attendee</button>
      <div id="validate-msg"></div>
    </div>
  </section>

  <!-- ADMIN -->
  <section id="admin-section" class="hidden">
    <h2>Platform Overview</h2>
    <div class="stat-row" id="overview-stats"></div>

    <h2>Organizer Approval Requests</h2>
    <table id="organizer-requests-table">
      <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>

    <h2>Manage Users</h2>
    <table id="users-table">
      <thead><tr><th>Name</th><th>Email / Username</th><th>Role</th><th>Account</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>
</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
