<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Road to Glory</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="topbar">
  <div class="brand">ROAD TO <span>GLORY</span></div>

  <div class="nav-links">
    <a href="home.html">Home</a>
    <a href="events.html">Events</a>
    <a href="dashboard.html" class="active">Dashboard</a>
    <a href="#" onclick="logout()">Sign Out</a>
  </div>

  <div class="user-box">
    <span class="user-icon">👤</span>
    <span id="username">User</span>
  </div>
</nav>

<div class="container">
  <div class="dashboard-header">

  <div>
    <h1 id="welcome"></h1>
    <p>Your football journey starts here ⚽</p>
  </div>

  <div class="dashboard-badge">
    🏆 Road To Glory
  </div>

</div>

<div id="msg"></div>

  <!-- ATTENDEE -->
<section id="attendee-section" class="hidden">

  <h2>Notifications</h2>
  <div id="notifications-list"></div>

  <h2 style="margin-top: 30px;">My Digital Tickets</h2>
  <div id="tickets-list"></div>

</section>

  <!-- ORGANIZER -->
  <section id="organizer-section" class="hidden">
    <h2>My Events</h2>
    <div id="organizer-events"></div>
  </section>

  <!-- ADMIN -->
  <section id="admin-section" class="hidden">
    <h2>Platform Overview</h2>
    <div class="stat-row" id="overview-stats"></div>


    <h2>Manage Users</h2>
    <table id="users-table">
      <thead><tr><th>Name</th><th>Email / Username</th><th>Role</th><th>Account</th><th>Action</th></tr></thead>
      <tbody></tbody>
    </table>
  </section>
</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/navbar.js"></script>
</body>
</html>
