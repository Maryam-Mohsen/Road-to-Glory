<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Road to Glory</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand">ROAD TO <span>GLORY</span></div>
</div>

<div class="hero">
  <h1>Egypt's Road to Glory</h1>
  <p>Fan Zones, screenings, and official World Cup events — all in one place.</p>
</div>

<div class="container" style="max-width:420px; padding-top:0;">
  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tab-login">Sign In</div>
      <div class="tab" id="tab-register">Create Account</div>
    </div>

    <div id="msg"></div>

    <form id="login-form">
      <label>Email or Username</label>
      <input type="text" id="login-email" required>
      <label>Password</label>
      <input type="password" id="login-password" required>
      <button type="submit" style="margin-top:18px; width:100%;">Sign In</button>
    </form>

    <form id="register-form" class="hidden">
      <label>Full Name</label>
      <input type="text" id="reg-name" required>
      <label>Email</label>
      <input type="email" id="reg-email" required>
      <label>Password</label>
      <input type="password" id="reg-password" minlength="6" required>
      <label>I am a...</label>
      <select id="reg-role">
        <option value="attendee">Attendee (Fan)</option>
        <option value="organizer">Organizer</option>
      </select>
      <button type="submit" style="margin-top:18px; width:100%;">Create Account</button>
    </form>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
